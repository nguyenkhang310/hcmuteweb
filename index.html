<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập hệ thống</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-body">
  <main class="login-page">
    <div class="overlay"></div>
    <div id="loginToast" class="login-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <section class="login-container">
      <article class="login-card">
        <section class="login-left">
          <header>
          <div class="brand">Trường Đại học Công Nghệ - Kỹ Thuật TP.HCM</div>
          <h1>Đăng nhập</h1>
          <p class="sub-text">Hệ thống quản lý sinh viên dành cho giảng viên và quản trị viên</p>

          </header>
          <form id="loginForm">
            <div class="input-group">
              <label for="username">Tên đăng nhập</label>
              <div class="input-box">
                <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                <i class="fa-solid fa-user"></i>
              </div>
            </div>

            <div class="input-group">
              <label for="password">Mật khẩu</label>
              <div class="input-box">
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Hiển thị mật khẩu" aria-pressed="false">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="login-btn">Đăng nhập</button>
          </form>
        </section>

        <aside class="login-right" aria-label="Login illustration">
          <figure class="image-card">
            <img src="https://dangbo.hcmute.edu.vn/wp-content/uploads/2025/08/536492172_1274942031096723_1004276345912267459_n.jpg" alt="Login Image" class="login-image">
          </figure>
        </aside>
      </article>
    </section>
  </main>

  <script src="he_thong.js"></script>
  <script>
const loginForm = document.getElementById("loginForm");
const passwordInput = document.getElementById("password");
const togglePasswordBtn = document.getElementById("togglePassword");
const loginToast = document.getElementById("loginToast");
let loginToastTimer;

function showLoginToast(message, type = "success") {
  if (!loginToast) return;

  window.clearTimeout(loginToastTimer);
  loginToast.textContent = message;
  loginToast.className = `login-toast show ${type}`;

  loginToastTimer = window.setTimeout(function () {
    loginToast.className = "login-toast";
  }, 2600);
}

if (togglePasswordBtn && passwordInput) {
  togglePasswordBtn.addEventListener("click", function () {
    const isHidden = passwordInput.type === "password";
    passwordInput.type = isHidden ? "text" : "password";
    togglePasswordBtn.setAttribute("aria-pressed", String(isHidden));
    togglePasswordBtn.setAttribute(
      "aria-label",
      isHidden ? "Ẩn mật khẩu" : "Hiện mật khẩu"
    );

    const icon = togglePasswordBtn.querySelector("i");
    if (icon) {
      icon.className = isHidden ? "fa-regular fa-eye-slash" : "fa-regular fa-eye";
    }
  });
}

if (loginForm) {
  loginForm.addEventListener("submit", function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = passwordInput ? passwordInput.value.trim() : "";

    if (username === "" || password === "") {
      showLoginToast("Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.", "error");
      return;
    }

    const loginResult = dangnhaphethong(username, password);

    if (loginResult.ok) {
      showLoginToast(
        `Đăng nhập thành công với vai trò ${laynhanvaitro(loginResult.user.role)}!`,
        "success"
      );
      window.setTimeout(function () {
        window.location.href = loginResult.redirectTo;
      }, 900);
    } else {
      showLoginToast(loginResult.message, "error");
    }
  });
}

</script>
</body>
</html>
