<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khoa & Lớp</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="page-faculty-class-list">
  <div class="sidebar-overlay"></div>
  <div class="layout">
    <my-sidebar></my-sidebar>

    <div class="main">
      <my-header></my-header>

      <main class="main-content container-fluid py-3">
        <section class="schedule-page">
          <div class="row g-0">
            <div class="col-12">
              <section class="student-table-card card border-0 shadow-sm">
            <header class="table-header">
              <h3>Danh sách lớp</h3>

              <div class="table-tools class-list-toolbar">
                <div class="table-search">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input type="text" id="class-search" placeholder="Tìm theo mã lớp...">
                </div>

                <div class="schedule-filter">
                  <i class="fa-solid fa-building-columns"></i>
                  <select id="filter-dept" class="form-select">
                    <option value="all">Tất cả khoa</option>
                  </select>
                </div>
              </div>
            </header>

            <div id="class-grid" class="class-grid-container"></div>
              </section>
            </div>
          </div>
        </section>

        <my-footer></my-footer>
      </main>
    </div>
  </div>

  <script src="he_thong.js"></script>
  <script>
const HIDDEN_DEPARTMENT_CLASS_NAMES = new Set();

function laydanhsachlopkhoa() {
  const activeUser = laynguoidungdangnhap();
  const studentCounts = classroomStudents.reduce((result, student) => {
    if (!student.className || HIDDEN_DEPARTMENT_CLASS_NAMES.has(student.className)) {
      return result;
    }

    result[student.className] = (result[student.className] || 0) + 1;
    return result;
  }, {});
  const managedClassSet = !activeUser || activeUser.role === "admin"
    ? null
    : new Set(
      typeof laydanhsachlopgiangvienquanly === "function"
        ? laydanhsachlopgiangvienquanly(activeUser)
        : []
    );

  const classMap = new Map(
    laydanhsachlopmaster()
      .filter((item) => {
        if (HIDDEN_DEPARTMENT_CLASS_NAMES.has(item.name)) {
          return false;
        }

        if (!managedClassSet) {
          return true;
        }

        return managedClassSet.has(String(item.name || "").trim());
      })
      .map((item) => ({
        id: item.id,
        name: item.name,
        displayName: item.displayName || "",
        faculty: item.departmentCode,
        deptCode: item.departmentCode,
        studentCount: studentCounts[item.name] || 0
      }))
      .map((item) => [item.name, item])
  );

  return Array.from(classMap.values()).sort((a, b) => a.name.localeCompare(b.name, "vi"));
}

function khoitaobolockhoa() {
  const filterSelect = document.getElementById("filter-dept");
  if (!filterSelect || filterSelect.dataset.initialized === "true") {
    return;
  }

  filterSelect.dataset.initialized = "true";

  laydanhsachkhoa().forEach((dept) => {
    const option = document.createElement("option");
    option.value = dept.code;
    option.textContent = dept.name;
    filterSelect.appendChild(option);
  });
}

function hienthidanhsachlop(data) {
  const container = document.getElementById("class-grid");
  if (!container) return;

  if (data.length === 0) {
    container.innerHTML = '<p class="no-data">Không tìm thấy lớp học nào.</p>';
    return;
  }

  container.innerHTML = data.map((cls) => {
    const dept = laykhoatheocode(cls.deptCode);
    const deptName = dept ? dept.name : "Chưa rõ khoa";
    const classTitle = cls.displayName || laytenhienthilop(cls.name) || cls.name;

    return `
      <div class="class-card">
        <div class="class-icon"><i class="fa-solid fa-users-rectangle"></i></div>
        <h3 class="class-name">${classTitle}</h3>
        <p class="dept-name">${deptName}</p>
        <div class="class-info">
          <span><i class="fa-solid fa-user-group"></i> Sĩ số: <strong>${cls.studentCount}</strong></span>
        </div>
        <button class="view-list-btn" data-class-id="${cls.id}">
          <span>Xem danh sách lớp</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    `;
  }).join("");
}

function xemchitietlop(classId) {
  const selectedClass = laydanhsachlopkhoa().find((item) => item.id === classId);
  if (!selectedClass) return;

  const params = new URLSearchParams({
    faculty: selectedClass.faculty,
    className: selectedClass.name
  });

  window.location.href = `quan_ly_lop_hoc.html?${params.toString()}`;
}

function locdanhsachlop() {
  const filterSelect = document.getElementById("filter-dept");
  const searchInput = document.getElementById("class-search");
  const selectedDept = filterSelect ? filterSelect.value : "all";
  const keyword = searchInput ? searchInput.value.trim().toLowerCase() : "";

  return laydanhsachlopkhoa().filter((item) => {
    const matchesDepartment = selectedDept === "all" || item.deptCode === selectedDept;
    const matchesKeyword = !keyword || item.name.toLowerCase().includes(keyword);
    return matchesDepartment && matchesKeyword;
  });
}

document.addEventListener("DOMContentLoaded", function () {
  const filterSelect = document.getElementById("filter-dept");
  const searchInput = document.getElementById("class-search");
  const classGrid = document.getElementById("class-grid");

  if (!filterSelect || !searchInput || !classGrid || classGrid.dataset.initialized === "true") {
    return;
  }

  classGrid.dataset.initialized = "true";
  taisinhvienlophoc();
  khoitaobolockhoa();
  hienthidanhsachlop(locdanhsachlop());

  filterSelect.addEventListener("change", function () {
    hienthidanhsachlop(locdanhsachlop());
  });

  searchInput.addEventListener("input", function () {
    hienthidanhsachlop(locdanhsachlop());
  });

  classGrid.addEventListener("click", function (event) {
    const viewButton = event.target.closest(".view-list-btn");
    if (!viewButton) {
      return;
    }

    const classId = viewButton.dataset.classId;
    if (classId) {
      xemchitietlop(classId);
    }
  });
});

</script>
</body>
</html>
